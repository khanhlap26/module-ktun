<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LAPBUFFXU TẢI " />
  <title>Tải phần mềm</title>

  <style>
    :root {
      --bg: #070a12;
      --card: rgba(15, 23, 42, 0.9);
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.18);
      --primary: #7c3aed;
      --primary-2: #2563eb;
      --warning: #f59e0b;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.24), transparent 30%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.2), transparent 28%),
        var(--bg);
    }

    .container {
      width: min(950px, calc(100% - 24px));
      margin: auto;
      padding: 35px 0 50px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #bbf7d0;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
    }

    .hero {
      padding: 45px 25px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      color: #ddd6fe;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(124, 58, 237, 0.35);
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1;
    }

    .description {
      max-width: 650px;
      margin: 18px auto 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .content {
      display: grid;
      gap: 20px;
      padding: 25px;
    }

    .section {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(2, 6, 23, 0.4);
    }

    .section-title {
      margin: 0 0 15px;
      font-size: 18px;
    }

    video {
      display: block;
      width: 100%;
      max-height: 560px;
      border-radius: 14px;
      background: #000;
    }

    .download-area {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
    }

    .download-area h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .download-area p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .download-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 16px 22px;
      color: white;
      font-weight: 800;
      text-decoration: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 14px 35px rgba(79, 70, 229, 0.3);
      transition: 0.2s;
    }

    .download-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .notice {
      color: #fde68a;
      line-height: 1.8;
      white-space: pre-line;
      border-color: rgba(245, 158, 11, 0.25);
      background: rgba(245, 158, 11, 0.07);
    }

    footer {
      padding-top: 20px;
      color: #64748b;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 650px) {
      .download-area {
        grid-template-columns: 1fr;
      }

      .download-button {
        width: 100%;
      }

      .hero {
        padding: 35px 18px;
      }

      .content {
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="topbar">
      <div class="logo" id="siteName">SOFTWARE DOWNLOAD</div>

      <div class="status">
        <span class="status-dot"></span>
        Link đang hoạt động
      </div>
    </div>

    <article class="card">
      <section class="hero">
        <div class="badge">BẢN TẢI CHÍNH THỨC</div>
        <h1 id="softwareName">Tên phần mềm</h1>
        <p class="description" id="softwareDescription"></p>
      </section>

      <div class="content">
        <section class="section">
          <h2 class="section-title">▶ Video hướng dẫn</h2>

          <video id="softwareVideo" controls preload="metadata">
            Trình duyệt của bạn không hỗ trợ video.
          </video>
        </section>

        <section class="section download-area">
          <div>
            <h2>Tải phần mềm ngay</h2>
            <p id="downloadDescription"></p>
          </div>

          <a
            id="downloadButton"
            class="download-button"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
          >
            ⬇ Tải ngay
          </a>
        </section>

        <section class="section notice">
          <h2 class="section-title">⚠ Lưu ý</h2>
          <div id="noticeText"></div>
        </section>
      </div>
    </article>

    <footer>
      © <span id="year"></span> <span id="footerName"></span>
    </footer>
  </main>

  <script>
 


    const SOFTWARE = {
      siteName: "LAPBUFFXU DOWNLOAD ",

      name: "CA Tủn Module ",

      description:
        "Xem video hướng dẫn bên dưới trước khi tải và sử dụng phần mềm.",

      // File video đặt chung thư mục với index.html
      videoFile: "module-ktun.mp4",

      // Có thể dùng file cùng thư mục hoặc link Google Drive, MediaFire...
      downloadLink: "module-ktn.zip",

      downloadDescription:
        "Nhấn nút Tải ngay để tải phiên bản mới nhất.",

      notice:
`• Xem kỹ video hướng dẫn trước khi sử dụng.
• Không đổi tên hoặc xóa file cần thiết.
• Nếu trình duyệt cảnh báo, hãy kiểm tra lại nguồn tải.
• Liên hệ admin nếu video hoặc link tải bị lỗi.`,

      footerName: "LAPBUFFXU DOWNLOAD"
    };

    document.title = SOFTWARE.name + " | Tải xuống";
    document.getElementById("siteName").textContent = SOFTWARE.siteName;
    document.getElementById("softwareName").textContent = SOFTWARE.name;
    document.getElementById("softwareDescription").textContent = SOFTWARE.description;
    document.getElementById("softwareVideo").src = SOFTWARE.videoFile;
    document.getElementById("downloadButton").href = SOFTWARE.downloadLink;
    document.getElementById("downloadDescription").textContent = SOFTWARE.downloadDescription;
    document.getElementById("noticeText").textContent = SOFTWARE.notice;
    document.getElementById("footerName").textContent = SOFTWARE.footerName;
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
